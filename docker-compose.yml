services:
  fastapi:
    build: 
      context: . 
      dockerfile: Dockerfile.fastapi
    container_name: fastapi-container

    ports: 
     - "8000:8000"
    networks:
     - app-network 

  streamlit:
    build:
      context: . 
      dockerfile: Dockerfile.churnstreamlit
    container_name: streamlit-container
    ports:
     - "8501:8501"
    environment:
     - API_URL=http://fastapi:8000
    depends_on: 
     - fastapi 
    networks:
     - app-network 

networks: 
  app-network: 
    driver: bridge 
    